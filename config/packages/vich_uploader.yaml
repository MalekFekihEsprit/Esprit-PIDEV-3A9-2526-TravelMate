vich_uploader:
    db_driver: orm
    mappings:
        hebergement_images:
            uri_prefix: /uploads/hebergements
            upload_destination: '%kernel.project_dir%/public/uploads/hebergements'
            namer: Vich\UploaderBundle\Naming\UniqidNamer
        destination_images:
            uri_prefix: /uploads/destinations
            upload_destination: '%kernel.project_dir%/public/uploads/destinations'
            namer: Vich\UploaderBundle\Naming\UniqidNamer