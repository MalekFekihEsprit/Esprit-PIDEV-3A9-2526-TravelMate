# config/services.yaml
parameters: {}

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\NotificationService:
        arguments:
            $ntfyUrl:   '%env(NTFY_URL)%'
            $ntfyTopic: '%env(NTFY_TOPIC)%'