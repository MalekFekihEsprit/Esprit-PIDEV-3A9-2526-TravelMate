# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# //https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    profile_photos_directory: '%kernel.project_dir%/public/uploads/profiles'
    activites_images_directory: '%kernel.project_dir%/public/uploads/activites'
    evenements_images_directory: '%kernel.project_dir%/public/uploads/evenements'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true
        autoconfigure: true

    # makes classes in src/ available to be used as services
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Controller\WeatherController:
        arguments:
            $openWeatherApiKey: '%env(OPENWEATHER_API_KEY)%'

    App\Controller\ReservationController:
        arguments:
            $stripeSecretKey: '%env(STRIPE_SECRET_KEY)%'
            $stripePublishableKey: '%env(STRIPE_PUBLISHABLE_KEY)%'
            $stripeWebhookSecret: '%env(STRIPE_WEBHOOK_SECRET)%'

    App\Service\TelegramService:
        arguments:
            $botToken: '%env(TELEGRAM_BOT_TOKEN)%'

    App\Service\AiRecommendationService:
        arguments:
            $aiServiceUrl: '%env(AI_SERVICE_URL)%'

    App\Service\TicketmasterService:
        arguments:
            $apiKey: '%env(TICKETMASTER_API_KEY)%'       

    App\EventListener\QuizRedirectListener:
        arguments:
            $router: '@router'
            $security: '@security.helper'
        tags:
            - { name: kernel.event_listener, event: kernel.request, priority: 10 }