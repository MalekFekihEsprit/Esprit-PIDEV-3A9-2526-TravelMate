# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.groq.cache_ttl: 86400
    app.openrouteservice.cache_ttl: 604800
    app.cerebras.api_key: ''
    app.cerebras.model: 'llama3.1-8b'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\GroqCulturalRulesService:
        arguments:
            $apiKey: '%env(string:GROQ_API_KEY)%'
            $model: '%env(string:GROQ_MODEL)%'
            $cacheDirectory: '%kernel.cache_dir%/groq_cultural_rules'
            $cacheTtl: '%app.groq.cache_ttl%'

    App\Service\OpenRouteServiceGeocoder:
        arguments:
            $apiKey: '%env(string:OPENROUTESERVICE_API_KEY)%'
            $geocodeUrl: '%env(string:OPENROUTESERVICE_GEOCODE_URL)%'
            $cacheDirectory: '%kernel.cache_dir%/openrouteservice_geocoder'
            $cacheTtl: '%app.openrouteservice.cache_ttl%'

    App\Service\FalVideoService:
        arguments:
            $apiKey: '%env(string:FAL_KEY)%'

    App\Service\CerebrasItinerarySuggestionService:
        arguments:
            $apiKey: '%env(default:app.cerebras.api_key:CEREBRAS_API_KEY)%'
            $model: '%env(default:app.cerebras.model:CEREBRAS_MODEL)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
